name: Auto Fix and Push Directly

on:
  push:
    branches: [ main ] # <--- LƯU Ý: Nếu dự án cũ của bạn dùng nhánh 'master' thì sửa chữ 'main' này thành 'master' nhé!

jobs:
  fix-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Prettier (Auto Fix)
        run: |
          npx prettier --write .

      - name: Commit and Push changes directly
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
 
          if [ -n "$(git status --porcelain)" ]; then
            echo "Phát hiện có lỗi! Đang tiến hành tự động sửa và push..."
            git add .
            git commit -m "bot: tự động sửa lỗi code thành công [skip ci]"
            git push origin main # <--- Sửa thành 'master' nếu dự án cũ dùng master
          else
            echo "Code sạch sẽ, không cần sửa gì cả!"
          fi

