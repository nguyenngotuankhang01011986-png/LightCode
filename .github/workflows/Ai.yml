name: AI Reviewer

on:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch: {}

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          export PR_BASE_REF="${{ github.base_ref }}"
          git diff origin/$PR_BASE_REF...HEAD > pr_diff.txt
          if [ ! -s pr_diff.txt ]; then exit 0; fi

          export PROMPT="Bạn là AI Reviewer. Review ngắn gọn đoạn diff này bằng tiếng Việt. Nếu code tốt ghi OK. Nội dung: $(cat pr_diff.txt)"
          
          RESPONSE=$(curl -s -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$(node -e 'console.log(JSON.stringify({contents:[{parts:[{text:process.env.PROMPT}]}]}))')")

          export REVIEW_COMMENT=$(echo "$RESPONSE" | node -e "try{console.log(JSON.parse(fs.readFileSync(0)).candidates[0].content.parts[0].text)}catch(e){console.log('OK')}" 2>/dev/null || echo "OK")

          if [ "$REVIEW_COMMENT" != "OK" ] && [ ! -z "$PR_NUMBER" ]; then
            CLEAN_TEXT=$(echo "$REVIEW_COMMENT" | sed 's/[#*`]//g')
            curl -s -X POST "https://api.github.com/repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "$(node -e "console.log(JSON.stringify({body:process.env.CLEAN_TEXT}))")"
          fi
